 version: "3.9"
 services:
   postgres:
     image: postgres:16
     restart: always
     environment:
       - POSTGRES_USER=root
       - POSTGRES_PASSWORD=root
       - POSTGRES_DB=online_shopping
     ports:
       - "5432:5432"
     volumes:
       - db:/var/lib/postgresql/data

 volumes:
   db:
     driver: local